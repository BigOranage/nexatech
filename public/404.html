<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NexaTech</title>
    <script>
      // GitHub Pages SPA 404 redirect
      // Stores the attempted URL and redirects to index.html
      // index.html will restore the URL via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
